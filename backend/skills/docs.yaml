skill:
  name: docs
  display_name: Google Docs
  description: Read Google Docs documents
  icon: description

api:
  google_api: docs.googleapis.com
  scopes:
    - https://www.googleapis.com/auth/documents

tools:
  - name: get_document
    description: >
      Get metadata about a Google Doc including title and last editor.
    gws_command: ["docs", "documents", "get"]
    parameters:
      - name: document_id
        type: string
        required: true
        description: The document ID (from the URL)
    gws_params_map:
      documentId: "{document_id}"
    response_mapping:
      fields:
        - source: documentId
          target: id
        - source: title
          target: title

  - name: read_document_text
    description: >
      Read the full text content of a Google Doc. Returns the
      plain text of the document body.
    gws_command: ["docs", "documents", "get"]
    parameters:
      - name: document_id
        type: string
        required: true
        description: The document ID
    gws_params_map:
      documentId: "{document_id}"
    response_mapping:
      fields:
        - source: title
          target: title
        - source: body
          target: body

  - name: create_docx_document
    description: >
      Create a professional Word (.docx) document with rich formatting —
      headings, tables, bullet lists, page numbers, headers/footers.
      Write complete docx-js JavaScript code that generates the file.
      Use for reports, memos, letters, briefs, contracts, or any structured
      text document. Returns a Google Drive link to the created file.
    handler: "tools.document_engine.create_docx_document"
    parameters:
      - name: title
        type: string
        required: true
        description: Document title (used as the filename)
      - name: code
        type: string
        required: true
        description: >
          Complete docx-js JavaScript code that produces the .docx file.
          Must use require('docx') and write the file to the current directory.
