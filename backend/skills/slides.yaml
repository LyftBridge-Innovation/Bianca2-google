skill:
  name: slides
  display_name: Google Slides & PPTX
  description: Read Google Slides presentations and create PowerPoint (.pptx) files
  icon: slideshow

api:
  google_api: slides.googleapis.com
  scopes:
    - https://www.googleapis.com/auth/presentations.readonly
    - https://www.googleapis.com/auth/drive.file

tools:
  - name: get_presentation
    description: >
      Get metadata about a Google Slides presentation including
      title and number of slides.
    gws_command: ["slides", "presentations", "get"]
    parameters:
      - name: presentation_id
        type: string
        required: true
        description: The presentation ID (from the URL)
    gws_params_map:
      presentationId: "{presentation_id}"
    response_mapping:
      fields:
        - source: presentationId
          target: id
        - source: title
          target: title

  - name: list_slides
    description: >
      List all slides in a presentation with their titles and layout info.
    gws_command: ["slides", "presentations", "get"]
    parameters:
      - name: presentation_id
        type: string
        required: true
        description: The presentation ID
    gws_params_map:
      presentationId: "{presentation_id}"
      fields: "slides.objectId,slides.slideProperties"
    response_mapping:
      list_key: slides
      fields:
        - source: objectId
          target: slide_id
        - source: "slideProperties.layoutObjectId"
          target: layout

  - name: create_pptx_presentation
    description: >
      Create a professional PowerPoint (.pptx) presentation with custom
      layouts, colors, charts, images, and rich formatting.
      Write complete pptxgenjs JavaScript code that generates the file.
      Use for pitch decks, slide decks, reports, or any presentation.
      Returns a Google Drive link to the created file.
    handler: "tools.document_engine.create_pptx_presentation"
    parameters:
      - name: title
        type: string
        required: true
        description: Presentation title (used as the filename)
      - name: code
        type: string
        required: true
        description: >
          Complete pptxgenjs JavaScript code that produces the .pptx file.
          Must use require('pptxgenjs') and write the file to the current directory.
